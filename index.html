<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Card Games Hub</title>
        <link rel="stylesheet" href="style.css" />
        </head>
    <body>

    <header class="site-header">
        <h1>🎴 Card Games Hub</h1>
        <p>Choose a game and start playing</p>
    </header>

    <main class="game-grid">

        <section class="game-card">
        <h2>Blackjack</h2>
        <p>Try to hit 21 without going over.</p>
        <button data-game="blackjack">Play</button>
        </section>

        <section class="game-card">
        <h2>War</h2>
        <p>High card wins. Simple. Brutal.</p>
        <button data-game="war">Play</button>
        </section>

        <section class="game-card">
        <h2>Memory Match</h2>
        <p>Flip cards and test your memory.</p>
        <button data-game="memory">Play</button>
        </section>

        <section class="game-card">
        <h2>Poker (Coming Soon)</h2>
        <p>Classic 5-card poker.</p>
        <button disabled>Locked</button>
        </section>

    </main>

    <footer class="site-footer">
        <p>Built for interactive learning 🧠</p>
    </footer>

    </body>
</html>
